<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Functions</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>JavaScript Functions</h1>
        <p>Click buttons to see different function types</p>

        <div class="buttons">
            <button onclick="calcDiscount()">Declaration</button>
            <button onclick="calcFare()">Expression</button>
            <button onclick="calcAverage()">Arrow</button>
            <button onclick="calcGST()">Anonymous</button>
            <button onclick="printOrders()">Callback</button>
        </div>

        <div id="output"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
